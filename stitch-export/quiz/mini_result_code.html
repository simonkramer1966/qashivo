<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Qashivo | Section Mini-Result</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Manrope & Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#565e74",
              "outline-variant": "#c6c6cd",
              "error-container": "#ffdad6",
              "background": "#f7f9fb",
              "tertiary-fixed": "#ffddb8",
              "on-secondary-container": "#006172",
              "on-error": "#ffffff",
              "tertiary-fixed-dim": "#ffb95f",
              "on-secondary-fixed": "#001f26",
              "surface-variant": "#e0e3e5",
              "on-tertiary-fixed-variant": "#653e00",
              "on-primary-fixed": "#131b2e",
              "secondary-fixed": "#acedff",
              "primary-fixed": "#dae2fd",
              "primary-fixed-dim": "#bec6e0",
              "surface-container": "#eceef0",
              "tertiary": "#000000",
              "surface-dim": "#d8dadc",
              "surface-container-high": "#e6e8ea",
              "on-tertiary": "#ffffff",
              "secondary-container": "#57dffe",
              "primary-container": "#131b2e",
              "on-surface": "#191c1e",
              "on-tertiary-container": "#b87500",
              "on-background": "#191c1e",
              "inverse-on-surface": "#eff1f3",
              "secondary": "#00687a",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "surface-container-highest": "#e0e3e5",
              "on-surface-variant": "#45464d",
              "tertiary-container": "#2a1700",
              "surface-container-low": "#f2f4f6",
              "primary": "#000000",
              "on-tertiary-fixed": "#2a1700",
              "surface": "#f7f9fb",
              "on-error-container": "#93000a",
              "on-primary-container": "#7c839b",
              "error": "#ba1a1a",
              "inverse-primary": "#bec6e0",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#3f465c",
              "inverse-surface": "#2d3133",
              "surface-bright": "#f7f9fb",
              "outline": "#76777d",
              "on-secondary-fixed-variant": "#004e5c",
              "secondary-fixed-dim": "#4cd7f6"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .progress-ring__circle {
        transition: stroke-dashoffset 0.35s;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }
    </style>
</head>
<body class="bg-background font-body text-on-background antialiased overflow-hidden">
<!-- TopNavBar -->
<header class="sticky top-0 w-full z-50 bg-[#f7f9fb] dark:bg-[#0f172a]">
<nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
<div class="text-2xl font-extrabold tracking-tighter text-[#0f172a] dark:text-white">Qashivo</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-[#191c1e]/60 dark:text-slate-400 font-medium font-['Manrope'] tracking-[-0.02em] hover:text-[#00687a] dark:hover:text-[#acedff] transition-colors duration-400" href="#">Insights</a>
<a class="text-[#191c1e]/60 dark:text-slate-400 font-medium font-['Manrope'] tracking-[-0.02em] hover:text-[#00687a] dark:hover:text-[#acedff] transition-colors duration-400" href="#">Cashflow</a>
<a class="text-[#000000] dark:text-[#acedff] font-bold border-b-2 border-[#00687a] pb-1 font-['Manrope'] tracking-[-0.02em] transition-colors duration-400" href="#">Health Check</a>
<a class="text-[#191c1e]/60 dark:text-slate-400 font-medium font-['Manrope'] tracking-[-0.02em] hover:text-[#00687a] dark:hover:text-[#acedff] transition-colors duration-400" href="#">Support</a>
</div>
<button class="bg-primary-container text-on-primary-fixed px-6 py-2.5 rounded-lg font-headline font-bold scale-95 duration-400 ease-out hover:opacity-90">
                Get Started
            </button>
</nav>
</header>
<main class="min-h-[calc(100vh-180px)] flex flex-col items-center justify-center p-6">
<!-- Result Container -->
<div class="max-w-xl w-full text-center space-y-10">
<!-- Section Label -->
<div class="flex flex-col items-center gap-2">
<span class="text-secondary font-label text-xs font-bold tracking-[0.15em] uppercase">
                    CREDIT CONTROL
                </span>
<div class="w-8 h-[2px] bg-secondary-fixed"></div>
</div>
<!-- Score Animation Area -->
<div class="relative flex flex-col items-center justify-center">
<div class="relative w-[180px] h-[180px] flex items-center justify-center">
<!-- Progress Ring SVG -->
<svg class="w-full h-full" viewbox="0 0 120 120">
<!-- Background Circle -->
<circle class="text-surface-container-high" cx="60" cy="60" fill="transparent" r="52" stroke="currentColor" stroke-width="8"></circle>
<!-- Amber Progress Circle (12/16 = 75%) -->
<circle class="progress-ring__circle text-tertiary-fixed-dim" cx="60" cy="60" fill="transparent" r="52" stroke="currentColor" stroke-dasharray="326.7" stroke-dashoffset="81.6" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<!-- Center Content -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-headline text-4xl font-extrabold tracking-tighter text-on-surface">12 <span class="text-on-surface-variant/40 text-2xl">/ 16</span></span>
</div>
</div>
</div>
<!-- Rating & Summary -->
<div class="space-y-4">
<div class="inline-flex items-center px-4 py-1.5 rounded-full bg-tertiary-fixed text-on-tertiary-fixed-variant font-label text-sm font-semibold tracking-wide">
                    At Risk
                </div>
<h1 class="font-headline text-2xl md:text-3xl font-bold tracking-tight text-on-surface max-w-md mx-auto leading-tight">
                    Your credit control has solid foundations — with room to optimise.
                </h1>
</div>
<!-- Continue Button -->
<div class="pt-6">
<button class="group inline-flex items-center justify-center gap-3 bg-secondary text-white px-8 py-4 rounded-xl font-headline font-bold text-lg shadow-sm transition-all duration-400 hover:bg-on-secondary-container hover:shadow-lg active:scale-95">
                    Next: Cashflow
                    <span class="material-symbols-outlined transition-transform duration-400 group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</div>
<!-- Decorative Context Elements (Subtle Asymmetric Layout) -->
<div class="fixed bottom-24 left-12 opacity-10 pointer-events-none hidden lg:block">
<div class="w-48 h-48 rounded-full border-[1.5px] border-secondary"></div>
</div>
<div class="fixed top-32 right-12 opacity-5 pointer-events-none hidden lg:block">
<div class="w-64 h-64 rounded-full bg-secondary-fixed"></div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-12 px-8 bg-[#eceef0] dark:bg-[#0f172a]">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
<div class="flex flex-col gap-2">
<div class="font-['Manrope'] font-bold text-lg text-[#0f172a] dark:text-white">Qashivo</div>
<p class="font-['Inter'] text-sm leading-relaxed tracking-wide text-[#0f172a] dark:text-slate-300 opacity-80">
                    © 2024 Qashivo. Editorial Financial Intelligence for UK SMEs.
                </p>
</div>
<div class="flex gap-6">
<a class="text-[#191c1e]/70 dark:text-slate-400 font-['Inter'] text-sm transition-opacity hover:text-[#000000] dark:hover:text-white" href="#">Privacy</a>
<a class="text-[#191c1e]/70 dark:text-slate-400 font-['Inter'] text-sm transition-opacity hover:text-[#000000] dark:hover:text-white" href="#">Terms</a>
<a class="text-[#191c1e]/70 dark:text-slate-400 font-['Inter'] text-sm transition-opacity hover:text-[#000000] dark:hover:text-white" href="#">Advisory Board</a>
<a class="text-[#191c1e]/70 dark:text-slate-400 font-['Inter'] text-sm transition-opacity hover:text-[#000000] dark:hover:text-white" href="#">Security</a>
</div>
</div>
</footer>
</body></html>
